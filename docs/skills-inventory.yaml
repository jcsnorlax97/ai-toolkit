      Use when a user-provided short video, screen recording, product clip, or
      lifestyle clip should become a social-platform Live Photo card with
      first-frame, duration, crop, and publish-path checks.
    canonical_repo: ai-toolkit
    canonical_path: skills/media/social-live-photo-card/SKILL.md
    owner: Justin
    last_reviewed: "2026-07-03"
    evidence:
      - date: "2026-07-03"
        type: methodology-intake
        notes: >
          Evaluated a public X post and referenced GitHub repository by op7418
          describing Live Photo generation and editing for social cards. The
          source showed repeatable workflow signals: platform duration
          constraints, first-frame static-card review, contact-sheet screening,
          card-structure choices, packaging caveats, and clear stop conditions.
          The local ai-toolkit skill was written as a reference-based
          adaptation with no upstream files, templates, assets, scripts, or
          skill text imported from the AGPL-3.0 upstream repository.
    next_action: >
      Forward-test on one real user-provided short video and record whether the
      first-frame, contact-sheet, duration, and publish-path checks were enough
      before promoting beyond candidate status.

