# Skill lifecycle inventory for skills whose canonical_repo is ai-toolkit.
# Split from skillops/inventory/skills.yaml on 2026-07-03 (ecosystem audit,
# docs/ecosystem-audit-2026-07.md). This file records this repo's skills only.
#
# Update rules:
# - Add an evidence entry after a real use, a lifecycle review, or a monthly
#   usage-rollup (hook log + capture skills_used field).
# - confidence vocabulary: emerging | validated | superseded.
# - Mechanical adjustments: >=3 helped uses -> validated; 0 triggers in 60
#   days -> flag stale (freeze candidate); >=2 fought verdicts -> flag review
#   (deprecate candidate).

skills:
  - id: client-flow-diagrams
    name: Client Flow Diagrams
    status: candidate
    confidence: emerging
    distribution: shared
    trigger: >
      Use when creating or revising high-level workflow, process, integration,
      or system-interaction diagrams for client or non-technical audiences.
    canonical_repo: ai-toolkit
    canonical_path: skills/engineering/client-flow-diagrams
    owner: Justin
    last_reviewed: "2026-06-10"
    evidence:
      - date: "2026-06-08"
        type: first-real-use
        notes: >
          Created from a real task translating detailed technical design
          material into business-level diagrams for a non-technical audience.
          The first lifecycle review sanitized the lesson log and moved
          unvalidated visual and tool preferences out of mandatory workflow
          rules.
      - date: "2026-06-08"
        type: lifecycle-correction
        notes: >
          Kept proactive jargon removal and avoiding global Mermaid step-curve
          styling as correctness lessons. Moved first-use visual preferences
          back to evidence instead of treating them as mandatory workflow
          rules.
      - date: "2026-06-10"
        type: second-real-use-review
        notes: >
          A second client-facing diagram task confirmed that precise swimlane
          layout requirements can justify a draw.io output path when Mermaid
          cannot control frame height or label placement. Lifecycle review also
          found that the new lesson log retained identifiable client names and
          promoted several once-observed style, coordinate, routing, and format
          preferences into mandatory workflow rules before repeated validation.
      - date: "2026-06-10"
        type: revision-applied
        notes: >
          Sanitized the second-use lesson log, retained confirmed Mermaid layout
          limitations in the core workflow, and moved exact draw.io styles,
          coordinates, routing values, and proactive format heuristics back to
          candidate evidence pending repeated validation.
      - date: "2026-06-10"
        type: continued-second-use-review
        notes: >
          Additional edge-clarity refinements from the same second task were
          retained as candidate evidence rather than promoted into the core
          workflow. Revised the color-coding lesson so color supplements clear
          labels, spacing, or line styles instead of becoming the sole means of
          distinguishing converging edges.
    next_action: >
      Use on one more client-facing diagram task, record a sanitized outcome,
      then review whether the trigger and output-format guidance have enough
      evidence for active status.

  - id: social-live-photo-card
